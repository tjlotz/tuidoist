name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Lint, build, smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uvx ruff check .

      - name: Build sdist and wheel
        run: uv build

      - name: Smoke install and import
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "import tuidoist; print(tuidoist.__version__)"
